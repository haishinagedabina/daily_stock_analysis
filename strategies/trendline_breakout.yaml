# Trendline Breakout Strategy / 趋势线突破 (Strategy A)
# Price breaks above a downtrend resistance trendline with volume confirmation.

name: trendline_breakout
display_name: 趋势线突破
description: 检测价格突破下降趋势线的信号，需量能确认，触碰次数越多突破越有效。
category: reversal
core_rules: [1, 3]
required_tools:
  - get_daily_history
  - get_realtime_quote

screening:
  filters:
    - field: trendline_breakout
      op: "=="
      value: true
    - field: above_ma100
      op: "=="
      value: true
  scoring:
    - field: volume_ratio
      weight: 35
      cap: 5.0
    - field: trendline_touch_count
      weight: 25
      bonus_above: 3
      bonus_multiplier: 500
    - field: trend_score
      weight: 25
    - field: liquidity_score
      weight: 15

instructions: |
  **趋势线突破（Strategy A）**

  信号判定标准：

  1. **下降趋势线识别**：
     - 通过近期 swing high 拟合线性下降趋势线。
     - 至少有 2 个触碰点确认趋势线有效性。

  2. **突破确认**：
     - 最新收盘价高于趋势线在该位置的投影值。
     - 成交量 >= 5日均量的 1.5 倍优先。

  3. **MA100 过滤条件**：
     - 个股价格需在 MA100 之上，避免弱势反弹中的虚假信号。

  评分调整：
  - 量比越高得分越高（上限 5 倍）。
  - 趋势线触碰次数 >= 3 次额外加分。
  - 趋势评分和流动性作为辅助确认。
