# Shrink Volume Pullback Strategy / 缩量回踩
# Volume shrinks during pullback to MA5/MA10, then price bounces.

name: shrink_pullback
display_name: 缩量回踩
description: 检测缩量回踩均线支撑信号，趋势延续的理想入场点。
category: trend
core_rules: [1, 2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

# -- 五层系统 metadata --
system_role: entry_core
strategy_family: trend
applicable_market: [balanced, aggressive]
applicable_theme: [main_theme, secondary_theme, follower_theme, non_theme]
setup_type: trend_pullback

screening:
  filters:
    - field: ma5
      op: ">="
      value_ref: ma10
    - field: ma10
      op: ">="
      value_ref: ma20
    - field: volume_ratio
      op: "<="
      value: 0.8
    - field: ma5_distance_pct
      op: "<="
      value: 2.0
  scoring:
    - field: trend_score
      weight: 40
    - field: volume_ratio
      weight: 30
      invert: true
      cap: 1.0
    - field: ma5_distance_pct
      weight: 20
      invert: true
      cap: 5.0
    - field: liquidity_score
      weight: 10

instructions: |
  **缩量回踩（Shrink Volume Pullback Strategy）**

  入场判定标准：

  1. **前提条件**（关联理念2：趋势交易）：
     - 股票必须处于上升趋势（MA5 > MA10 > MA20）。
     - 使用 `analyze_trend` 确认多头排列。

  2. **回踩检测**（关联理念4：买点偏好）：
     - 使用 `get_daily_history` 和 `get_realtime_quote`。
     - 价格回踩至 MA5 附近（误差 1% 以内）或 MA10 附近（误差 2% 以内）。
     - 回调期间成交量 < 5 日均量的 70%（缩量特征）。
     - `analyze_trend` → volume_status 应显示缩量。

  3. **反弹信号**（关联理念1：严进策略）：
     - 当前价格守住均线支撑位。
     - MA5 乖离率 < 2% — 最佳买入区间。

  4. **确认条件**（关联理念5：风险排查）：
     - `search_stock_news` 无利空消息。
     - 筹码分布健康（获利比例 50-80%）。

  买点结构确认：
  - 缩量回踩 MA5 → 高成熟度买点
  - 缩量回踩 MA10 且量能 < 0.6 倍均量 → 中成熟度买点
  - 理想买点设在 MA5 水平，次优买点设在 MA10。
  - 止损设在 MA20 水平。
  - 在 `buy_reason` 中注明"缩量回踩"。
