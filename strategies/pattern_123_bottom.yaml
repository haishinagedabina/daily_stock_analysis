# 123 Bottom Reversal Strategy / 低位123底部反转 (Strategy B)
# Joint detector: prior downtrend + low-position P1 + sync breakout of P2 & trendline.

name: pattern_123_bottom
display_name: 低位123底部反转
description: 低位123反转形态联合确认：P1须在近期价格区间低位，P2与下降趋势线同步突破，确保真正的底部反转而非中段整理。
category: reversal
core_rules: [1, 3]
required_tools:
  - get_daily_history
  - get_realtime_quote

screening:
  filters:
    # 联合检测器核心条件：state == "confirmed"（P2与趋势线同步突破）
    - field: pattern_123_low_trendline
      op: "=="
      value: true
  scoring:
    - field: pattern_123_signal_strength
      weight: 40
      cap: 1.0
    - field: volume_ratio
      weight: 25
      cap: 5.0
    - field: trend_score
      weight: 20
    - field: liquidity_score
      weight: 15

instructions: |
  **低位123底部反转（Strategy B — 联合检测器版）**

  本策略使用 Low123TrendlineDetector 联合检测器，比旧版增加了三层前置过滤：
  前置下跌验证、低位判断（近60根K线最低30%分位）、P2与趋势线同步突破。

  信号判定标准（state == "confirmed"）：

  1. **前置下跌验证**：
     - P1 之前存在有意义的下降趋势（摆动高点降序 / MA10<MA20 / 价格斜率为负，满足≥2条）。

  2. **低位过滤**：
     - P1 的最低价须在近 60 根 K 线收盘区间最低 30% 分位内，确保底部反转而非中段整理。

  3. **123 结构（P1/P2/P3）**：
     - P1：阶段性低点（swing low）。
     - P2：P1 后的反弹高点，涨幅 >= 2.5%。
     - P3：P2 后的较高低点，回撤比例在 15%~85% 之间。

  4. **联合突破确认（同步窗口 3 根 K 线内）**：
     - 收盘价同时突破 P2 高点 AND 下降趋势线投影值。
     - P2 与趋势线突破间隔 > 3 根则降级为 late_or_weak，不触发。

  评分调整：
  - signal_strength（联合检测器综合评分）权重最高。
  - 量比作为流动性确认。
  - 趋势评分和流动性作为辅助确认。
