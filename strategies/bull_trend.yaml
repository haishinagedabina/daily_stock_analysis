# Default Bull Trend Strategy / 默认多头趋势

name: bull_trend
display_name: 默认多头趋势
description: 默认个股分析优先策略，识别多头排列、趋势延续与回踩低吸机会。
category: trend
core_rules: [1, 2, 3]
