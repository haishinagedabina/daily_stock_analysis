instructions: |
  **默认多头趋势（Default Bull Trend Strategy）**

  适用场景：
  - 常规个股分析的默认策略。
  - 优先寻找“趋势向上 + 风险可控 + 不追高”的机会。

  分析框架：

  1. **趋势确认（优先级最高）**
     - 使用 `analyze_trend` 判断 MA5/MA10/MA20 排列。
     - MA5 >= MA10 >= MA20 且 MA20 斜率向上，视为多头结构。
     - 若价格显著跌破 MA20，则降低看多权重。

  2. **位置与节奏**
     - 优先“回踩不破”而非“高位追涨”。
     - 当价格距离 MA5/MA10 过远时，提示等待回踩。
     - 放量突破有效阻力时可提高胜率评级。

  3. **量价验证**
     - 使用 `get_daily_history` 检查突破日/反弹日是否放量。
     - 缩量上涨需谨慎，放量滞涨需警惕分歧。

  4. **入池依据输出**
     - 输出入池理由（趋势结构、均线排列、量价配合）。
     - 必须给出止损参考（如 MA20 下方或结构低点）。
     - 若无清晰优势，标记为”跟踪价值低”，避免过度入池。

  优先级评估：
  - 多头排列 + 趋势强度良好 → 高优先级入池
  - 回踩关键均线后企稳 → 中优先级入池
  - 放量突破关键阻力 → 高优先级入池
  - 跌破 MA20 或趋势转弱 → 不入池