# 123 Bottom Reversal Strategy / 123底部反转 (Strategy B)
# Detects 123 bottom pattern with breakout above Point 2 confirmation.

name: pattern_123_bottom
display_name: 123底部反转
description: 检测123底部反转形态，价格突破Point 2确认反转成立，高低点关系验证。
category: reversal
core_rules: [1, 3]
required_tools:
  - get_daily_history
  - get_realtime_quote

screening:
  filters:
    - field: pattern_123_bottom
      op: "=="
      value: true
    - field: pattern_123_breakout
      op: "=="
      value: true
  scoring:
    - field: volume_ratio
      weight: 30
      cap: 5.0
    - field: pattern_123_higher_low_pct
      weight: 25
      bonus_above: 5.0
      bonus_multiplier: 200
    - field: trend_score
      weight: 25
    - field: liquidity_score
      weight: 20

instructions: |
  **123底部反转（Strategy B）**

  信号判定标准：

  1. **Point 1（低点）**：
     - 明显的 swing low，代表阶段性底部。

  2. **Point 2（反弹高点）**：
     - Point 1 之后的 swing high，代表反弹力度。

  3. **Point 3（更高低点）**：
     - Point 2 之后的 swing low，必须高于 Point 1。
     - 体现"不创新低"的底部特征。

  4. **突破确认**：
     - 收盘价突破 Point 2 高点，确认反转成立。

  评分调整：
  - 量比越高得分越高（上限 5 倍）。
  - Point 3 高于 Point 1 的幅度越大（> 5%）额外加分。
  - 趋势评分和流动性作为辅助确认。
