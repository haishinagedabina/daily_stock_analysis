# MA100 + Low-Position 123 Bottom Combined Strategy / MA100+低位123结构 (Strategy 2)
# Joint gate: above MA100 + 123 bottom pattern confirmed + freshness ≤3 bars.

name: ma100_low123_combined
display_name: MA100+低位123结构
description: 站上MA100均线 + 低位123底部反转形态联合确认。P1须在低位区间，P2与下降趋势线同步突破，且入场时效≤3根K线。
category: reversal
core_rules: [1, 3]
required_tools:
  - get_daily_history
  - get_realtime_quote

# -- 五层系统 metadata --
system_role: entry_core
strategy_family: reversal
applicable_market: [balanced, aggressive]
applicable_theme: [main_theme, secondary_theme, follower_theme, non_theme]
setup_type: low123_breakout

screening:
  filters:
    - field: ma100_low123_confirmed
      op: "=="
      value: true
  scoring:
    - field: ma100_low123_pattern_strength
      weight: 45
      cap: 1.0
    - field: ma100_low123_ma_score
      weight: 25
      cap: 1.0
    - field: volume_ratio
      weight: 15
      cap: 5.0
    - field: trend_score
      weight: 15

instructions: |
  **MA100+低位123结构（Strategy 2 — 联合策略）**

  本策略将 MA100 突破确认与低位 123 底部反转形态联合为一个选股条件。
  核心逻辑：股价站上 MA100 均线 + 形成低位 123 反转结构 + 入场时效严格把控。

  入选条件（全部满足 → ma100_low123_confirmed = True）：

  1. **MA100 站上确认**：
     - 收盘价 > MA100 均线（above_ma100 = True）。

  2. **低位123底部反转确认**：
     - Low123TrendlineDetector 检测状态为 confirmed。
     - P1 须在近 60 根 K 线收盘区间最低 30% 分位内。
     - P2 与下降趋势线在 3 根 K 线窗口内同步突破。

  3. **入场时效门控（硬性截断）**：
     - 123 结构突破发生在最近 3 根 K 线内（由检测器内置时效控制）。
     - 超过 3 根 K 线直接不入选。

  评分权重：
  - ma100_low123_pattern_strength（45%）：123 结构信号强度，包含 P2 突破、趋势线突破、MA 确认等。
  - ma100_low123_ma_score（25%）：MA100 突破天数（≤5天=1.0, ≤10天=0.7）× 距离得分。
  - volume_ratio（15%）：量比，流动性确认。
  - trend_score（15%）：趋势评分辅助确认。

  选股理念：选股在于精而不在多，严格控制入场时效。
